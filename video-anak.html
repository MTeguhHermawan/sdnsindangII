<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Video Anak - Ramadan Ceria</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Papa Parse untuk membaca CSV dengan benar -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- Instagram embed script -->
    <script async src="//www.instagram.com/embed.js"></script>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(145deg, #f9f3e6 0%, #f0e2c5 100%);
            margin: 0;
            padding: 0;
            color: #2c3e50;
            overflow-y: auto;
        }
        .ramadan-ornament {
            position: relative;
        }
        .ramadan-ornament::before {
            content: "🌙 ⭐ 🌙 ⭐ 🌙";
            position: absolute;
            top: 10px;
            left: 0;
            width: 100%;
            font-size: 24px;
            color: rgba(255, 215, 0, 0.2);
            white-space: nowrap;
            animation: float 10s linear infinite;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes float {
            from { transform: translateX(-100%); }
            to { transform: translateX(100%); }
        }
        header {
            background: linear-gradient(135deg, #2e7d32, #f9a825);
            color: white;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border-bottom: 5px solid #fdd835;
            position: relative;
            z-index: 1;
        }
        header h1 {
            margin: 0;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        header p {
            margin: 10px 0 0;
            font-size: 1.2em;
            opacity: 0.9;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        .back-link {
            display: inline-block;
            margin: 20px 0;
            padding: 10px 20px;
            background-color: #f9a825;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: background 0.3s;
        }
        .back-link:hover {
            background-color: #f57f17;
        }
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-top: 30px;
            margin-bottom: 40px;
        }
        .video-card {
            background: white;
            border-radius: 25px 25px 15px 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid #f9a825;
        }
        .video-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 18px 35px rgba(0,0,0,0.2);
        }
        .video-title {
            background: linear-gradient(145deg, #f9a825, #fdd835);
            padding: 15px;
            font-weight: bold;
            font-size: 1.2em;
            color: #2e7d32;
            text-align: center;
            border-bottom: 3px solid #2e7d32;
            word-break: break-word;
        }
        .embed-container {
            position: relative;
            width: 100%;
            background: #f0f0f0;
            overflow: hidden;
        }
        .embed-container blockquote {
            margin: 0;
            width: 100% !important;
            max-width: 100% !important;
        }
        .loading, .error {
            text-align: center;
            padding: 50px;
            font-size: 1.5em;
        }
        .error {
            color: #c62828;
            background: #ffcdd2;
            border-radius: 10px;
            margin: 20px;
        }
        footer {
            text-align: center;
            padding: 25px;
            background: #2e7d32;
            color: white;
            border-top: 5px solid #fdd835;
            position: relative;
            z-index: 1;
            clear: both;
        }
    </style>
</head>
<body class="ramadan-ornament">
    <header>
        <h1>🌙 Video Kegiatan Ramadan Ceria</h1>
        <p>Momen indah bersama anak-anak kelas VI</p>
    </header>
    <div class="container">
        <a href="ramadan.html" class="back-link">← Kembali ke Ramadan Ceria</a>
        <div id="video-container">
            <div class="loading">Memuat video...</div>
        </div>
    </div>
    <footer>
        © 2026 SDN Sindang II -- Kelas VI | Ramadan 1447 H
    </footer>

    <script>
        // Fungsi memuat dan memparse CSV dengan Papa Parse
        async function loadCSV() {
            try {
                const response = await fetch('video.csv');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const csvText = await response.text();
                return new Promise((resolve) => {
                    Papa.parse(csvText, {
                        delimiter: ",",          // delimiter koma
                        quoteChar: '"',           // karakter kutip
                        header: false,            // tidak ada header otomatis
                        skipEmptyLines: true,
                        complete: (results) => {
                            let data = results.data;
                            // Buang baris header jika ada (baris pertama berisi "judul")
                            if (data.length > 0 && data[0][0] === 'judul') {
                                data = data.slice(1);
                            }
                            // Ambil kolom: judul, platform, embedHtml
                            const videos = data.map(row => ({
                                judul: row[0] ? row[0].trim() : '',
                                platform: row[1] ? row[1].trim() : '',
                                embedHtml: row[2] ? row[2].trim() : ''
                            })).filter(v => v.judul && v.embedHtml);
                            resolve(videos);
                        },
                        error: (err) => {
                            console.error('Parse error:', err);
                            resolve([]);
                        }
                    });
                });
            } catch (error) {
                console.error('Gagal memuat CSV:', error);
                return [];
            }
        }

        // Render video ke halaman
        async function renderVideos() {
            const container = document.getElementById('video-container');
            const videos = await loadCSV();

            if (!videos || videos.length === 0) {
                container.innerHTML = '<div class="error">❌ Tidak ada video yang tersedia. Periksa konsol untuk detail error.</div>';
                return;
            }

            let html = '<div class="video-grid">';
            videos.forEach(video => {
                // Langsung gunakan embedHtml (blockquote Instagram) yang sudah bersih
                html += `
                    <div class="video-card">
                        <div class="video-title">${escapeHTML(video.judul)}</div>
                        <div class="embed-container">
                            ${video.embedHtml}
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;

            // Panggil Instagram embed processor agar blockquote dirender
            if (window.instgrm) {
                window.instgrm.Embeds.process();
            } else {
                // Tunggu sebentar hingga script embed.js siap
                setTimeout(() => {
                    if (window.instgrm) window.instgrm.Embeds.process();
                }, 2000);
            }
        }

        // Fungsi sederhana untuk menghindari XSS
        function escapeHTML(str) {
            return String(str).replace(/[&<>"]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                if (m === '"') return '&quot;';
                return m;
            });
        }

        // Jalankan
        renderVideos();
    </script>
</body>
</html>
