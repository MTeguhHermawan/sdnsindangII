<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Video Anak - Ramadan Ceria</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(145deg, #f9f3e6 0%, #f0e2c5 100%);
            margin: 0;
            padding: 0;
            color: #2c3e50;
            overflow-y: auto;
        }
        .ramadan-ornament {
            position: relative;
        }
        .ramadan-ornament::before {
            content: "🌙 ⭐ 🌙 ⭐ 🌙";
            position: absolute;
            top: 10px;
            left: 0;
            width: 100%;
            font-size: 24px;
            color: rgba(255, 215, 0, 0.2);
            white-space: nowrap;
            animation: float 10s linear infinite;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes float {
            from { transform: translateX(-100%); }
            to { transform: translateX(100%); }
        }
        header {
            background: linear-gradient(135deg, #2e7d32, #f9a825);
            color: white;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border-bottom: 5px solid #fdd835;
            position: relative;
            z-index: 1;
        }
        header h1 {
            margin: 0;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        header p {
            margin: 10px 0 0;
            font-size: 1.2em;
            opacity: 0.9;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        .back-link {
            display: inline-block;
            margin: 20px 0;
            padding: 10px 20px;
            background-color: #f9a825;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: background 0.3s;
        }
        .back-link:hover {
            background-color: #f57f17;
        }
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-top: 30px;
            margin-bottom: 40px;
        }
        .video-card {
            background: white;
            border-radius: 25px 25px 15px 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid #f9a825;
        }
        .video-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 18px 35px rgba(0,0,0,0.2);
        }
        .video-title {
            background: linear-gradient(145deg, #f9a825, #fdd835);
            padding: 15px;
            font-weight: bold;
            font-size: 1.2em;
            color: #2e7d32;
            text-align: center;
            border-bottom: 3px solid #2e7d32;
            word-break: break-word;
        }
        .embed-container {
            position: relative;
            padding-bottom: 100%; /* 1:1 aspect ratio */
            height: 0;
            overflow: hidden;
            background: #f0f0f0;
        }
        .embed-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .fallback-link {
            display: block;
            text-align: center;
            padding: 20px;
            background: #e8f5e8;
            color: #2e7d32;
            font-weight: bold;
            text-decoration: none;
        }
        .fallback-link:hover {
            text-decoration: underline;
        }
        .loading, .error {
            text-align: center;
            padding: 50px;
            font-size: 1.5em;
        }
        .error {
            color: #c62828;
            background: #ffcdd2;
            border-radius: 10px;
            margin: 20px;
        }
        footer {
            text-align: center;
            padding: 25px;
            background: #2e7d32;
            color: white;
            border-top: 5px solid #fdd835;
            position: relative;
            z-index: 1;
            clear: both;
        }
    </style>
</head>
<body class="ramadan-ornament">
    <header>
        <h1>🌙 Video Kegiatan Ramadan Ceria</h1>
        <p>Momen indah bersama anak-anak kelas VI</p>
    </header>
    <div class="container">
        <a href="ramadan.html" class="back-link">← Kembali ke Ramadan Ceria</a>
        <div id="video-container">
            <div class="loading">Memuat video...</div>
        </div>
    </div>
    <footer>
        © 2026 SDN Sindang II -- Kelas VI | Ramadan 1447 H
    </footer>

    <script>
        // Fungsi memuat CSV
        async function loadCSV() {
            try {
                const response = await fetch('video.csv');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const csvText = await response.text();
                return parseCSV(csvText);
            } catch (error) {
                console.error('Gagal memuat CSV:', error);
                return null;
            }
        }

        // Parser CSV dengan delimiter koma, menangani kolom berisi petik
        function parseCSV(csv) {
            const lines = csv.split('\n').filter(line => line.trim() !== '');
            if (lines.length === 0) return [];

            // Abaikan baris header (kolom: judul, platform, url)
            const result = [];
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;

                // Cari koma pertama dan kedua
                let firstComma = line.indexOf(',');
                if (firstComma === -1) continue;
                let secondComma = line.indexOf(',', firstComma + 1);
                if (secondComma === -1) continue;

                let judul = line.substring(0, firstComma).trim();
                let platform = line.substring(firstComma + 1, secondComma).trim();
                let sisa = line.substring(secondComma + 1).trim();

                // Ekstrak URL yang mungkin diapit petik
                let url = '';
                if (sisa.startsWith('"')) {
                    // Cari petik penutup
                    let endQuote = sisa.indexOf('"', 1);
                    if (endQuote !== -1) {
                        url = sisa.substring(1, endQuote);
                    } else {
                        url = sisa; // fallback
                    }
                } else {
                    // Jika tidak diapit petik, ambil sampai koma berikutnya
                    let nextComma = sisa.indexOf(',');
                    url = nextComma === -1 ? sisa : sisa.substring(0, nextComma);
                }
                url = url.trim();

                if (judul && platform && url) {
                    result.push({ judul, platform, url });
                }
            }
            console.log('Data video:', result);
            return result;
        }

        // Konversi URL ke embed Instagram / TikTok
        function getEmbedUrl(platform, url) {
            platform = platform.toLowerCase();
            if (platform.includes('insta')) { // menangani 'instagram' atau 'instagran'
                const match = url.match(/(?:instagram\.com\/(?:p|reel)\/)([^/?]+)/);
                if (match) {
                    // Gunakan embed /p/ (bekerja untuk post dan reel)
                    return `https://www.instagram.com/p/${match[1]}/embed`;
                }
            } else if (platform.includes('tiktok')) {
                const match = url.match(/tiktok\.com\/@[^/]+\/video\/(\d+)/);
                if (match) {
                    return `https://www.tiktok.com/embed/v2/${match[1]}`;
                }
            }
            return null;
        }

        async function renderVideos() {
            const container = document.getElementById('video-container');
            const videos = await loadCSV();

            if (!videos || videos.length === 0) {
                container.innerHTML = '<div class="error">❌ Tidak ada video yang tersedia. Periksa konsol untuk detail error.</div>';
                return;
            }

            let html = '<div class="video-grid">';
            videos.forEach(video => {
                const embedUrl = getEmbedUrl(video.platform, video.url);
                if (!embedUrl) {
                    // Fallback: tampilkan tautan langsung
                    html += `
                        <div class="video-card">
                            <div class="video-title">${escapeHTML(video.judul)}</div>
                            <div class="embed-container" style="background:#fff3e0; display:flex; align-items:center; justify-content:center;">
                                <a href="${escapeHTML(video.url)}" target="_blank" class="fallback-link" rel="noopener noreferrer">
                                    🔗 Buka Video di ${escapeHTML(video.platform)}
                                </a>
                            </div>
                        </div>
                    `;
                    return;
                }

                html += `
                    <div class="video-card">
                        <div class="video-title">${escapeHTML(video.judul)}</div>
                        <div class="embed-container">
                            <iframe src="${escapeHTML(embedUrl)}" allowfullscreen loading="lazy"></iframe>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        // Fungsi sederhana untuk menghindari XSS
        function escapeHTML(str) {
            return String(str).replace(/[&<>"]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                if (m === '"') return '&quot;';
                return m;
            });
        }

        renderVideos();
    </script>
</body>
</html>
